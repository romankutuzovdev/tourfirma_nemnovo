# Конфиг nginx для Django (Nemnovo Tour)
# API на порту 8005, статика и медиа через nginx.
#
# Установка:
#   1. Замените /home/user/nemnovo на реальный путь
#   2. sudo cp nginx-nemnovo.conf /etc/nginx/sites-available/nemnovo
#   3. sudo ln -s /etc/nginx/sites-available/nemnovo /etc/nginx/sites-enabled/
#   4. sudo nginx -t && sudo systemctl reload nginx

upstream nemnovo_gunicorn {
    server 127.0.0.1:8000;
}

server {
    listen 8005;
    server_name 87.229.34.70 _;

    client_max_body_size 20M;

    # Статика Django (admin, rest_framework и т.д.)
    location /static/ {
        alias /home/user/nemnovo/backend/staticfiles/;
    }

    # Медиа (загруженные файлы)
    location /media/ {
        alias /home/user/nemnovo/backend/media/;
    }

    # API и всё остальное — в gunicorn
    location / {
        proxy_pass http://nemnovo_gunicorn;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
